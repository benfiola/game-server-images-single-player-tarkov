name: Periodic Version Check

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  check:
    name: Check for new versions
    runs-on: ubuntu-latest
    outputs:
      versions_to_build: ${{ steps.check.outputs.versions_to_build }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Check latest versions and which need building
        id: check
        run: |
          OUTPUT=$(go run check-versions.go)
          echo "versions_to_build=$OUTPUT" >> $GITHUB_OUTPUT
          echo "Versions to build: $OUTPUT"

  build:
    name: Build and Release ${{ matrix.version }}
    needs: check
    if: needs.check.outputs.versions_to_build != '[]'
    permissions:
      actions: write
    strategy:
      matrix:
        version: ${{ fromJson(needs.check.outputs.versions_to_build) }}
    runs-on: ubuntu-latest
    steps:
      # checkout might be needed to allow gh CLI to work
      - uses: actions/checkout@v4
      - name: Trigger build-and-release workflow
        run: |
          gh workflow run build-and-release.yml \
            -f version=${{ matrix.version }}
        env:
          GH_TOKEN: ${{ github.token }}
