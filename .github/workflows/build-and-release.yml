name: Build and Release SPT

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build and release (e.g., 3.9.5 or 4.0.0)"
        required: true
        type: string
  workflow_call:
    inputs:
      version:
        description: "Version to build and release"
        required: true
        type: string

jobs:
  determine-build-type:
    name: Determine Build Type
    runs-on: ubuntu-latest
    outputs:
      build_type: ${{ steps.parse.outputs.build_type }}
    steps:
      - name: Parse version and determine build type
        id: parse
        run: |
          VERSION="${{ inputs.version }}"

          # Validate version format
          if ! [[ $VERSION =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format: $VERSION"
            exit 1
          fi

          # Extract major version
          MAJOR=$(echo $VERSION | sed 's/\([0-9]*\).*/\1/')

          if [ "$MAJOR" -lt 4 ]; then
            echo "build_type=nodejs" >> $GITHUB_OUTPUT
            echo "Version $VERSION is nodejs (< 4.0.0)"
          else
            echo "build_type=csharp" >> $GITHUB_OUTPUT
            echo "Version $VERSION is csharp (>= 4.0.0)"
          fi

  build-nodejs-amd64:
    name: Build NodeJS amd64 (${{ inputs.version }})
    needs: determine-build-type
    if: needs.determine-build-type.outputs.build_type == 'nodejs'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout build scripts
        uses: actions/checkout@v4
        with:
          path: build-repo
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git git-lfs

      - name: Prepare build environment
        run: |
          mkdir -p build-output

      - name: Build nodejs SPT
        run: |
          bash build-repo/build-nodejs.sh \
            "${{ inputs.version }}" \
            "spt-${{ inputs.version }}-amd64.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spt-${{ inputs.version }}-amd64
          path: spt-${{ inputs.version }}-amd64.tar.gz

  build-nodejs-arm64:
    name: Build NodeJS arm64 (${{ inputs.version }})
    needs: determine-build-type
    if: needs.determine-build-type.outputs.build_type == 'nodejs'
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout build scripts
        uses: actions/checkout@v4
        with:
          path: build-repo
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git git-lfs

      - name: Prepare build environment
        run: |
          mkdir -p build-output

      - name: Build nodejs SPT
        run: |
          bash build-repo/build-nodejs.sh \
            "${{ inputs.version }}" \
            "spt-${{ inputs.version }}-arm64.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spt-${{ inputs.version }}-arm64
          path: spt-${{ inputs.version }}-arm64.tar.gz

  build-csharp-amd64:
    name: Build C# amd64 (${{ inputs.version }})
    needs: determine-build-type
    if: needs.determine-build-type.outputs.build_type == 'csharp'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout build scripts
        uses: actions/checkout@v4
        with:
          path: build-repo
          fetch-depth: 1

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.312"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git git-lfs

      - name: Build C# (amd64)
        run: |
          bash build-repo/build-csharp.sh \
            "${{ inputs.version }}" \
            "amd64" \
            "spt-${{ inputs.version }}-amd64.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spt-${{ inputs.version }}-amd64
          path: spt-${{ inputs.version }}-amd64.tar.gz

  build-csharp-arm64:
    name: Build C# arm64 (${{ inputs.version }})
    needs: determine-build-type
    if: needs.determine-build-type.outputs.build_type == 'csharp'
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout build scripts
        uses: actions/checkout@v4
        with:
          path: build-repo
          fetch-depth: 1

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.312"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git git-lfs

      - name: Build C# (arm64)
        run: |
          bash build-repo/build-csharp.sh \
            "${{ inputs.version }}" \
            "arm64" \
            "spt-${{ inputs.version }}-arm64.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spt-${{ inputs.version }}-arm64
          path: spt-${{ inputs.version }}-arm64.tar.gz

  release:
    name: Create Release ${{ inputs.version }}
    needs:
      [
        determine-build-type,
        build-nodejs-amd64,
        build-nodejs-arm64,
        build-csharp-amd64,
        build-csharp-arm64,
      ]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Validate builds succeeded
        run: |
          BUILD_TYPE="${{ needs.determine-build-type.outputs.build_type }}"

          if [ "$BUILD_TYPE" = "nodejs" ]; then
            if [ "${{ needs.build-nodejs-amd64.result }}" != "success" ]; then
              echo "NodeJS amd64 build failed"
              exit 1
            fi
            if [ "${{ needs.build-nodejs-arm64.result }}" != "success" ]; then
              echo "NodeJS arm64 build failed"
              exit 1
            fi
          else
            if [ "${{ needs.build-csharp-amd64.result }}" != "success" ]; then
              echo "C# amd64 build failed"
              exit 1
            fi
            if [ "${{ needs.build-csharp-arm64.result }}" != "success" ]; then
              echo "C# arm64 build failed"
              exit 1
            fi
          fi

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: spt-*
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          files: artifacts/**/*
          draft: false
          prerelease: false
