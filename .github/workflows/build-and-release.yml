name: Build and Release SPT

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build and release (e.g., 3.9.5 or 4.0.0)"
        required: true
        type: string
  workflow_call:
    inputs:
      version:
        description: "Version to build and release"
        required: true
        type: string

permissions:
  contents: write
  actions: write

jobs:
  determine-build-type:
    name: Determine Build Type
    runs-on: ubuntu-latest
    outputs:
      build_type: ${{ steps.parse.outputs.build_type }}
      type: ${{ steps.parse.outputs.type }}
    steps:
      - name: Parse version and determine build type
        id: parse
        run: |
          VERSION="${{ inputs.version }}"

          # Validate version format
          if ! [[ $VERSION =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format: $VERSION"
            exit 1
          fi

          # Extract major version
          MAJOR=$(echo $VERSION | sed 's/\([0-9]*\).*/\1/')

          if [ "$MAJOR" -lt 4 ]; then
            echo "build_type=legacy" >> $GITHUB_OUTPUT
            echo "type=legacy" >> $GITHUB_OUTPUT
            echo "Version $VERSION is legacy (< 4.0.0)"
          else
            echo "build_type=modern" >> $GITHUB_OUTPUT
            echo "type=modern" >> $GITHUB_OUTPUT
            echo "Version $VERSION is modern (>= 4.0.0)"
          fi

  build-legacy:
    name: Build Legacy (${{ inputs.version }})
    needs: determine-build-type
    if: needs.determine-build-type.outputs.build_type == 'legacy'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout build scripts
        uses: actions/checkout@v4
        with:
          path: build-repo
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git git-lfs

      - name: Prepare build environment
        run: |
          mkdir -p build-output

      - name: Build legacy SPT
        run: |
          bash build-repo/scripts/build-legacy.sh \
            "${{ inputs.version }}" \
            "$(pwd)/build-output"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spt-${{ inputs.version }}-legacy
          path: build-output/
          retention-days: 30
          compression-level: 0

  build-csharp-amd64:
    name: Build C# amd64 (${{ inputs.version }})
    needs: determine-build-type
    if: needs.determine-build-type.outputs.build_type == 'modern'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout build scripts
        uses: actions/checkout@v4
        with:
          path: build-repo
          fetch-depth: 1

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git git-lfs dotnet-sdk-9.0

      - name: Build modern C# (amd64)
        run: |
          bash build-repo/scripts/build-csharp.sh \
            "${{ inputs.version }}" \
            "amd64" \
            "$(pwd)/build-output"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spt-${{ inputs.version }}-amd64
          path: build-output/
          retention-days: 30
          compression-level: 0

  build-csharp-arm64:
    name: Build C# arm64 (${{ inputs.version }})
    needs: determine-build-type
    if: needs.determine-build-type.outputs.build_type == 'modern'
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout build scripts
        uses: actions/checkout@v4
        with:
          path: build-repo
          fetch-depth: 1

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git git-lfs dotnet-sdk-9.0

      - name: Build modern C# (arm64)
        run: |
          bash build-repo/scripts/build-csharp.sh \
            "${{ inputs.version }}" \
            "arm64" \
            "$(pwd)/build-output"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spt-${{ inputs.version }}-arm64
          path: build-output/
          retention-days: 30
          compression-level: 0

  release:
    name: Create Release ${{ inputs.version }}
    needs:
      [
        determine-build-type,
        build-legacy,
        build-csharp-amd64,
        build-csharp-arm64,
      ]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Validate builds succeeded
        run: |
          BUILD_TYPE="${{ needs.determine-build-type.outputs.build_type }}"

          if [ "$BUILD_TYPE" = "legacy" ]; then
            if [ "${{ needs.build-legacy.result }}" != "success" ]; then
              echo "Legacy build failed"
              exit 1
            fi
          else
            if [ "${{ needs.build-csharp-amd64.result }}" != "success" ]; then
              echo "C# amd64 build failed"
              exit 1
            fi
            if [ "${{ needs.build-csharp-arm64.result }}" != "success" ]; then
              echo "C# arm64 build failed"
              exit 1
            fi
          fi

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: spt-*
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.version }}
          name: Single Player Tarkov ${{ inputs.version }}
          files: artifacts/**/*
          draft: false
          prerelease: false
