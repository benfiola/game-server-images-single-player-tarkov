name: Build Legacy SPT

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., v3.9.5)'
        required: true
        type: string
  workflow_call:
    inputs:
      version:
        description: 'Version to build'
        required: true
        type: string

jobs:
  build:
    name: Build Legacy ${{ inputs.version }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Validate version format
        run: |
          VERSION="${{ inputs.version }}"
          if ! [[ $VERSION =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format: $VERSION"
            exit 1
          fi
          # Ensure it's legacy (< 4.0.0)
          MAJOR=$(echo $VERSION | sed 's/v\([0-9]*\).*/\1/')
          if [ "$MAJOR" -ge 4 ]; then
            echo "Version $VERSION is not legacy (>= 4.0.0). Use build-csharp workflows instead."
            exit 1
          fi

      - name: Build legacy SPT
        run: go run build.go build --version=${{ inputs.version }} --output=./dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spt-${{ inputs.version }}-legacy
          path: dist/
          retention-days: 30
